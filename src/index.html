                                    className: "fa fa-wifi",
                                    style: { marginRight: 8 },
                                }),
                                "Click 'Send Request' to test the API",
                            ),
                        ),
                    );
                }

                const statusClass =
                    response.status >= 200 && response.status < 300
                        ? "success"
                        : response.status >= 400
                          ? "error"
                          : "info";

                const responseType = response.responseType || "text";
                const responseJson = JSON.stringify(response.data, null, 2);

                // Get raw text for HTML/text responses
                const rawText =
                    response.data?.raw ||
                    (typeof response.data === "string" ? response.data : "");

                // HTTP status code meanings
                const getStatusMeaning = (code) => {
                    const meanings = {
                        // 1xx Informational
                        100: "Continue",
                        101: "Switching Protocols",
                        102: "Processing",
                        103: "Early Hints",
                        // 2xx Success
                        200: "OK",
                        201: "Created",
                        202: "Accepted",
                        203: "Non-Authoritative Information",
                        204: "No Content",
                        205: "Reset Content",
                        206: "Partial Content",
                        207: "Multi-Status",
                        208: "Already Reported",
                        226: "IM Used",
                        // 3xx Redirection
                        300: "Multiple Choices",
                        301: "Moved Permanently",
                        302: "Found",
                        303: "See Other",
                        304: "Not Modified",
                        305: "Use Proxy",
                        306: "Switch Proxy",
                        307: "Temporary Redirect",
                        308: "Permanent Redirect",
                        // 4xx Client Error
                        400: "Bad Request",
                        401: "Unauthorized",
                        402: "Payment Required",
                        403: "Forbidden",
                        404: "Not Found",
                        405: "Method Not Allowed",
                        406: "Not Acceptable",
                        407: "Proxy Authentication Required",
                        408: "Request Timeout",
                        409: "Conflict",
                        410: "Gone",
                        411: "Length Required",
                        412: "Precondition Failed",
                        413: "Content Too Large",
                        414: "URI Too Long",
                        415: "Unsupported Media Type",
                        416: "Range Not Satisfiable",
                        417: "Expectation Failed",
                        418: "I'm a teapot",
                        421: "Misdirected Request",
                        422: "Unprocessable Content",
                        423: "Locked",
                        424: "Failed Dependency",
                        425: "Too Early",
                        426: "Upgrade Required",
                        428: "Precondition Required",
                        429: "Too Many Requests",
                        431: "Request Header Fields Too Large",
                        451: "Unavailable For Legal Reasons",
                        // 5xx Server Error
                        500: "Internal Server Error",
                        501: "Not Implemented",
                        502: "Bad Gateway",
                        503: "Service Unavailable",
                        504: "Gateway Timeout",
                        505: "HTTP Version Not Supported",
                        506: "Variant Also Negotiates",
                        507: "Insufficient Storage",
                        508: "Loop Detected",
                        510: "Not Extended",
                        511: "Network Authentication Required",
                    };
                    return meanings[code] || "";
                };

                // Get color based on status code category
                const getStatusColor = (code) => {
                    if (code >= 100 && code < 200) return "var(--cyan)";
                    if (code >= 200 && code < 300) return "var(--green)";
                    if (code >= 300 && code < 400) return "var(--blue)";
                    if (code >= 400 && code < 500) return "var(--orange)";
                    if (code >= 500) return "var(--red)";
                    return "var(--t3)";
                };

                const statusMeaning = getStatusMeaning(response.status);
                const statusColor = getStatusColor(response.status);

                // Determine label based on response type
                const getResponseLabel = () => {
                    switch (responseType) {
                        case "json":
                            return "JSON Response";
                        case "html":
                            return "HTML Response";
                        case "empty":
                            return "No Content";
                        default:
                            return "Text Response";
                    }
                };

                // Get content to display based on response type
                const getResponseContent = () => {
                    switch (responseType) {
                        case "json":
                            return responseJson;
                        case "html":
                            return rawText;
                        case "empty":
                            return "";
                        case "text":
                        default:
                            return rawText;
                    }
                };

                // Get language for syntax highlighting
                const getResponseLang = () => {
                    switch (responseType) {
                        case "json":
                            return "json";
                        case "html":
                            return "xml"; // highlight.js uses xml for HTML
                        case "text":
                            return "plaintext";
                        case "empty":
                            return "plaintext";
                        default:
                            return "plaintext";
                    }
                };

                return h(
                    "div",
                    { className: "response-area" },
                    h(
                        "div",
                        { className: "response-hd" },
                        h(
                            "div",
                            { className: "response-ttl" },
                            h("i", { className: "fa fa-server" }),
                            "Response",
                        ),
                        h(
                            "span",
                            {
                                className: `response-status ${statusClass}`,
                            },
                            `${response.status} ${statusMeaning}`,
                        ),
                    ),
                    h(
                        "div",
                        {
                            className: "resp-tabs",
                            style: {
                                margin: "12px 0",
                                padding: "0 4px",
                                borderBottom: "1px solid var(--bd-sub)",
                            },
                        },
                        h(
                            "button",
                            {
                                className: `resp-tab ${respTab === "body" ? "on" : ""}`,
                                onClick: () => setRespTab("body"),
                                style: {
                                    fontSize: "11px",
                                    padding: "6px 12px",
                                },
                            },
                            "Body",
                        ),
                        h(
                            "button",
                            {
                                className: `resp-tab ${respTab === "header" ? "on" : ""}`,
                                onClick: () => setRespTab("header"),
                                style: {
                                    fontSize: "11px",
                                    padding: "6px 12px",
                                },
                            },
                            "Headers",
                        ),
                    ),
                    respTab === "body"
                        ? responseType === "empty"
                            ? h(
                                  "div",
                                  {
                                      style: {
                                          padding: "40px 0",
                                          textAlign: "center",
                                          color: "var(--t3)",
                                          background: "var(--bg-card)",
                                          borderRadius: "8px",
                                          border: "1px dashed var(--bd)",
                                          fontSize: "13px",
                                      },
                                  },
                                  h("i", {
                                      className: "fa fa-check-circle",
                                      style: {
                                          marginRight: 8,
                                          color: statusColor,
                                          fontSize: "24px",
                                      },
                                  }),
                                  h(
                                      "div",
                                      { style: { marginTop: 12 } },
                                      statusMeaning || "Request completed",
                                  ),
                                  h(
                                      "div",
                                      { style: { marginTop: 4 } },
                                      `HTTP ${response.status}${response.statusText ? " - " + response.statusText : ""}`,
                                  ),
                              )
                            : h(
                                  "div",
                                  {
                                      className: "code-wrap",
                                      style: { marginBottom: 0 },
                                  },
                                  h(
                                      "div",
                                      { className: "code-hd" },
                                      h(
                                          "span",
                                          { className: "code-hd-lbl" },
                                          getResponseLabel(),
                                      ),
                                      h(CopyBtn, {
                                          text: getResponseContent(),
                                      }),
                                  ),
                                  h(
                                      "pre",
                                      { className: "response-pre" },
                                      h(HljsCode, {
                                          code: getResponseContent(),
                                          lang: getResponseLang(),
                                      }),
                                  ),
                              )
                        : h(
                              "div",
                              {
                                  className: "code-wrap",
                                  style: { marginBottom: 0 },
                              },
                              h(
                                  "div",
                                  { className: "code-hd" },
                                  h(
                                      "span",
                                      { className: "code-hd-lbl" },
                                      "Response Headers",
                                  ),
                                  h(CopyBtn, {
                                      text: JSON.stringify(
                                          response.headers,
                                          null,
                                          2,
                                      ),
                                  }),
                              ),
                              h(
                                  "pre",
                                  { className: "response-pre" },
                                  h(HljsCode, {
                                      code: JSON.stringify(
                                          response.headers,
                                          null,
                                          2,
                                      ),
                                      lang: "json",
                                  }),
                              ),
                          ),
                );
            }

            function CodeSamples({
                ep,
                spec,
                apiKey,
                bearerToken,
                authType,
                baseUrl,
                setApiKey,
                setBearerToken,
                setAuthType,
                showApiKey,
                setShowApiKey,
                showBearer,
                setShowBearer,
            }) {
                const [lang, setLang] = useState("curl");
                const [activeTab, setActiveTab] = useState("samples");
                const code = useMemo(
                    () => genCode(lang, ep, spec),
                    [lang, ep, spec],
                );
                const info = LANGS.find((l) => l.id === lang);
                const [params, setParams] = useState({});
                const [bodyText, setBodyText] = useState("");
                const [selectedFiles, setSelectedFiles] = useState({});
                const [response, setResponse] = useState(null);
                const [loading, setLoading] = useState(false);

                const queryParams = (ep.op.parameters || []).filter(
                    (p) => p.in === "query",
                );
                const pathParams = (ep.op.parameters || []).filter(
                    (p) => p.in === "path",
                );
                const bodyExample = getBodyEx(ep.op, spec);

                const securityRequirements =
                    ep.op.security || spec.security || [];
                const securitySchemes = spec.components?.securitySchemes || {};

                const requiredSchemes = useMemo(() => {
                    const schemes = [];
                    securityRequirements.forEach((req) => {
                        Object.keys(req).forEach((name) => {
                            const scheme = securitySchemes[name];
                            if (scheme) {
                                schemes.push({ name, ...scheme });
                            } else {
                                // Fallback: infer scheme type from name pattern
                                const nameLower = name.toLowerCase();
                                if (nameLower.includes("oauth")) {
                                    schemes.push({
                                        name,
                                        type: "oauth2",
                                    });
                                } else if (nameLower.includes("auth")) {
                                    // Catches petstore_auth, home_auth, etc.
                                    schemes.push({
                                        name,
                                        type: "oauth2",
                                    });
                                } else if (nameLower === "bearer_auth") {
                                    schemes.push({
                                        name,
                                        type: "http",
                                        scheme: "bearer",
                                    });
                                } else if (
                                    nameLower === "api_key" ||
                                    nameLower === "apikey"
                                ) {
                                    schemes.push({
                                        name,
                                        type: "apiKey",
                                        in: "header",
                                        name: "X-API-Key",
                                    });
                                } else if (
                                    nameLower.includes("api") ||
                                    nameLower.includes("key")
                                ) {
                                    schemes.push({
                                        name,
                                        type: "apiKey",
                                        in: "header",
                                        name:
                                            name === "api_key"
                                                ? "X-API-Key"
                                                : "Authorization",
                                    });
                                } else {
                                    // Default to OAuth2 for unknown auth schemes
                                    schemes.push({
                                        name,
                                        type: "oauth2",
                                    });
                                }
                            }
                        });
                    });
                    return schemes;
                }, [securityRequirements, securitySchemes]);

                const hasApiKey = requiredSchemes.some(
                    (s) =>
                        s.type === "apiKey" ||
                        (s.type === "http" && s.scheme === "basic"),
                );
                const hasBearer = requiredSchemes.some(
                    (s) =>
                        (s.type === "http" && s.scheme === "bearer") ||
                        s.type === "oauth2" ||
                        s.type === "openIdConnect",
                );
                const isSecurityRequired = requiredSchemes.length > 0;

                useEffect(() => {
                    if (hasApiKey && !hasBearer) setAuthType("api_key");
                    else if (hasBearer && !hasApiKey) setAuthType("bearer");
                }, [hasApiKey, hasBearer]);

                const multipartContent =
                    ep.op.requestBody?.content?.["multipart/form-data"];
                const binaryContent =
                    ep.op.requestBody?.content?.["application/octet-stream"];
                const isMultipart = !!multipartContent;
                const isBinary = !!binaryContent;
                const multipartSchema = multipartContent?.schema;
                const fileFields =
                    isMultipart && multipartSchema?.properties
                        ? Object.entries(multipartSchema.properties).filter(
                              ([, prop]) =>
                                  prop.type === "string" &&
                                  prop.format === "binary",
                          )
                        : [];

                useEffect(() => {
                    if (bodyExample) {
                        setBodyText(JSON.stringify(bodyExample, null, 2));
                    }
                }, [ep.id]);

                useEffect(() => {
                    setParams({});
                    setResponse(null);
                    setSelectedFiles({});
                }, [ep.id]);

                const buildUrl = () => {
                    let url = baseUrl + ep.path;
                    pathParams.forEach((p) => {
                        const val = params[p.name] || `{${p.name}}`;
                        url = url.replace(`{${p.name}}`, val);
                    });
                    const qParams = Object.entries(params).filter(
                        ([key]) => !pathParams.find((p) => p.name === key),
                    );
                    if (qParams.length) {
                        url +=
                            "?" +
                            qParams
                                .map(
                                    ([k, v]) => `${k}=${encodeURIComponent(v)}`,
                                )
                                .join("&");
                    }
                    return url;
                };

                const sendRequest = async () => {
                    setLoading(true);
                    setResponse(null);
                    const url = buildUrl();

                    if (
                        (isMultipart && fileFields.length > 0) ||
                        (isBinary && selectedFiles.binary)
                    ) {
                        const headers = {};
                        if (isSecurityRequired) {
                            if (authType === "api_key" && apiKey) {
                                const scheme = requiredSchemes.find(
                                    (s) =>
                                        s.type === "apiKey" ||
                                        (s.type === "http" &&
                                            s.scheme === "basic"),
                                );
                                const headerName = scheme?.name || "X-API-Key";
                                headers[headerName] = apiKey;
                            } else if (authType === "bearer" && bearerToken) {
                                headers["Authorization"] =
                                    `Bearer ${bearerToken}`;
                            }
                        }

                        let body;
                        if (isMultipart) {
                            // For multipart/form-data, use FormData
                            body = new FormData();
                            fileFields.forEach(([fieldName]) => {
                                const file = selectedFiles[fieldName];
                                if (file) {
                                    body.append(fieldName, file);
                                }
                            });
                            // Don't set Content-Type for FormData, browser sets it with boundary
                        } else if (isBinary) {
                            // For binary content, send file directly
                            body = selectedFiles.binary;
                            headers["Content-Type"] =
                                "application/octet-stream";
                        }

                        const options = {
                            method: ep.method.toUpperCase(),
                            headers,
                            body,
                        };

                        try {
                            const res = await fetch(url, options);
                            const contentType =
                                res.headers.get("content-type") || "";
                            const hasBody =
                                res.status !== 204 && res.status !== 304;
                            const data = hasBody
                                ? await res.json().catch(() => res.text())
                                : "";
                            const headers = {};
                            res.headers.forEach((v, k) => {
                                headers[k] = v;
                            });

                            // Determine response type based on content-type and data
                            let responseType = "text";
                            if (
                                contentType.includes("application/json") ||
                                contentType.includes("application/problem+json")
                            ) {
                                responseType = "json";
                            } else if (contentType.includes("text/html")) {
                                responseType = "html";
                            }

                            // No content responses
                            if (!hasBody || data === "") {
                                responseType = "empty";
                            }

                            setResponse({
                                status: res.status,
                                statusText: res.statusText,
                                data:
                                    typeof data === "string"
                                        ? { raw: data }
                                        : data,
                                headers,
                                responseType,
                                method: ep.method.toUpperCase(),
                            });
                        } catch (e) {
                            // Network error - display as text response
                            setResponse({
                                status: 0,
                                statusText: "Network Error",
                                data: {
                                    raw: `Network Error: ${e.message}\n\nPlease check:\n- The server is running\n- CORS is properly configured\n- Your network connection`,
                                },
                                headers: {},
                                responseType: "text",
                                method: ep.method.toUpperCase(),
                            });
                        } finally {
                            setLoading(false);
                        }
                        return;
                    }

                    const headers = {
                        "Content-Type": "application/json",
                    };
                    if (isSecurityRequired) {
                        if (authType === "api_key" && apiKey) {
                            const scheme = requiredSchemes.find(
                                (s) =>
                                    s.type === "apiKey" ||
                                    (s.type === "http" && s.scheme === "basic"),
                            );
                            const headerName = scheme?.name || "X-API-Key";
                            headers[headerName] = apiKey;
                        } else if (authType === "bearer" && bearerToken) {
                            headers["Authorization"] = `Bearer ${bearerToken}`;
                        }
                    }
                    const options = {
                        method: ep.method.toUpperCase(),
                        headers,
                    };
                    if (
                        ep.method.toLowerCase() !== "get" &&
                        ep.method.toLowerCase() !== "head" &&
                        bodyText
                    ) {
                        try {
                            options.body = JSON.parse(bodyText);
                        } catch (e) {
                            setLoading(false);
                            // Invalid JSON - display as text response
                            setResponse({
                                status: 400,
                                statusText: "Invalid JSON",
                                data: {
                                    raw: `Invalid JSON: ${e.message}`,
                                },
                                headers: {},
                                responseType: "text",
                                method: ep.method.toUpperCase(),
                            });
                            return;
                        }
                    }
                    try {
                        const res = await fetch(url, options);
                        const contentType =
                            res.headers.get("content-type") || "";
                        const hasBody =
                            res.status !== 204 && res.status !== 304;
                        const data = hasBody
                            ? await res.json().catch(() => res.text())
                            : "";
                        const headers = {};
                        res.headers.forEach((v, k) => {
                            headers[k] = v;
                        });

                        // Determine response type based on content-type and data
                        let responseType = "text";
                        if (
                            contentType.includes("application/json") ||
                            contentType.includes("application/problem+json")
                        ) {
                            responseType = "json";
                        } else if (contentType.includes("text/html")) {
                            responseType = "html";
                        }

                        // No content responses
                        if (!hasBody || data === "") {
                            responseType = "empty";
                        }

                        setResponse({
                            status: res.status,
                            statusText: res.statusText,
                            data:
                                typeof data === "string" ? { raw: data } : data,
                            headers,
                            responseType,
                            method: ep.method.toUpperCase(),
                        });
                    } catch (e) {
                        // Network error - display as text response
                        setResponse({
                            status: 0,
                            statusText: "Network Error",
                            data: {
                                raw: `Network Error: ${e.message}\n\nPlease check:\n- The server is running\n- CORS is properly configured\n- Your network connection`,
                            },
                            headers: {},
                            responseType: "text",
                            method: ep.method.toUpperCase(),
                        });
                    } finally {
                        setLoading(false);
                    }
                };

                const updateParam = (name, value) => {
                    setParams((prev) => ({ ...prev, [name]: value }));
                };

                const statusClass = response
                    ? response.status >= 200 && response.status < 300
                        ? "success"
                        : response.status >= 400
                          ? "error"
                          : "info"
                    : "";
                return h(
                    "div",
                    { style: { marginBottom: 20 } },
                    h("div", { className: "sec-lbl" }, "Code Samples"),
                    h(
                        "div",
                        { className: "test-tabs", style: { marginBottom: 12 } },
                        h(
                            "button",
                            {
                                className: `test-tab ${activeTab === "samples" ? "on" : ""}`,
                                onClick: () => setActiveTab("samples"),
                            },
                            h("i", {
                                className: "fa fa-code test-tab-icon",
                            }),
                            "Samples",
                        ),
                        h(
                            "button",
                            {
                                className: `test-tab ${activeTab === "tryit" ? "on" : ""}`,
                                onClick: () => setActiveTab("tryit"),
                            },
                            h("i", {
                                className: "fa fa-flask test-tab-icon",
                            }),
                            "Try It",
                        ),
                    ),
                    activeTab === "samples" &&
                        h(
                            "div",
                            null,
                            h(
                                "div",
                                { className: "code-wrap" },
                                h(
                                    "div",
                                    { className: "lang-tabs" },
                                    LANGS.map((l) =>
                                        h(
                                            "button",
                                            {
                                                key: l.id,
                                                onClick: () => setLang(l.id),
                                                className: `lang-tab ${lang === l.id ? "on" : ""}`,
                                            },
                                            h("i", {
                                                className: l.fa,
                                                style: { fontSize: 13 },
                                            }),
                                            l.label,
                                        ),
                                    ),
                                ),
                                h(
                                    "div",
                                    { className: "code-hd" },
                                    h(
                                        "span",
                                        { className: "code-hd-lbl" },
                                        `${info?.label} example`,
                                    ),
                                    h(CopyBtn, { text: code }),
                                ),
                                h(
                                    "pre",
                                    null,
                                    h(HljsCode, {
                                        code,
                                        lang: info?.hl || "bash",
                                    }),
                                ),
                            ),
                        ),
                    activeTab === "tryit" &&
                        h(
                            "div",
                            { className: "test-panel" },
                            h(
                                "div",
                                { className: "test-panel-hd" },
                                h(
                                    "div",
                                    { className: "test-panel-ttl" },
                                    h("i", { className: "fa fa-flask" }),
                                    "Test This Endpoint",
                                ),
                                h(
                                    "button",
                                    {
                                        className: `btn-test ${loading ? "loading" : ""}`,
                                        onClick: sendRequest,
                                        disabled: loading,
                                    },
                                    h("i", {
                                        className: loading
                                            ? "fa fa-spinner fa-spin"
                                            : "fa fa-paper-plane",
                                    }),
                                    loading ? "Sending..." : "Send Request",
                                ),
                            ),
                            h(
                                "div",
                                { className: "test-url" },
                                h(
                                    "span",
                                    {
                                        className: `test-method m-${ep.method} mb-${ep.method}`,
                                    },
                                    ep.method.toUpperCase(),
                                ),
                                buildUrl(),
                            ),
                            h(
                                "div",
                                { style: { marginBottom: 12 } },
                                [...pathParams, ...queryParams].length > 0
                                    ? [...pathParams, ...queryParams].map((p) =>
                                          h(
                                              "div",
                                              {
                                                  key: p.name,
                                                  className: "param-input-row",
                                              },
                                              h(
                                                  "div",
                                                  { className: "param-label" },
                                                  p.name,
                                                  p.required &&
                                                      h(
                                                          "span",
                                                          {
                                                              style: {
                                                                  color: "var(--red)",
                                                              },
                                                          },
                                                          " *",
                                                      ),
                                              ),
                                              h("input", {
                                                  className: "param-input",
                                                  type: "text",
                                                  placeholder:
                                                      p.example ||
                                                      p.description ||
                                                      "",
                                                  value: params[p.name] || "",
                                                  onChange: (e) =>
                                                      updateParam(
                                                          p.name,
                                                          e.target.value,
                                                      ),
                                              }),
                                              h(
                                                  "div",
                                                  { className: "param-type" },
                                                  Array.isArray(p.schema?.type)
                                                      ? p.schema.type.join(
                                                            " | ",
                                                        )
                                                      : p.schema?.type ||
                                                            "string",
                                              ),
                                          ),
                                      )
                                    : h(
                                          "div",
                                          {
                                              style: {
                                                  color: "var(--t3)",
                                                  fontSize: 12,
                                                  textAlign: "center",
                                                  padding: "20px 0",
                                              },
                                          },
                                          h("i", {
                                              className: "fa fa-info-circle",
                                              style: { marginRight: 6 },
                                          }),
                                          "No parameters for this endpoint",
                                      ),
                            ),
                            isSecurityRequired &&
                                h(
                                    "div",
                                    { className: "auth-header-input" },
                                    h(
                                        "div",
                                        {
                                            className: "auth-header-label",
                                            style: {
                                                display: "flex",
                                                alignItems: "center",
                                                justifyContent: "space-between",
                                                width: "100%",
                                            },
                                        },
                                        h(
                                            "div",
                                            {
                                                style: {
                                                    display: "flex",
                                                    alignItems: "center",
                                                    gap: 6,
                                                },
                                            },
                                            h("i", { className: "fa fa-key" }),
                                            "Authorization",
                                        ),
                                        hasApiKey &&
                                            hasBearer &&
                                            h(
                                                "div",
                                                {
                                                    style: {
                                                        display: "flex",
                                                        gap: 4,
                                                    },
                                                },
                                                h(
                                                    "button",
                                                    {
                                                        className: `theme-btn ${authType === "api_key" ? "on" : ""}`,
                                                        style: {
                                                            width: "auto",
                                                            padding: "4px 10px",
                                                            fontSize: "11px",
                                                        },
                                                        onClick: () =>
                                                            setAuthType(
                                                                "api_key",
                                                            ),
                                                        title: "API Key authentication",
                                                    },
                                                    "API Key",
                                                ),
                                                h(
                                                    "button",
                                                    {
                                                        className: `theme-btn ${authType === "bearer" ? "on" : ""}`,
                                                        style: {
                                                            width: "auto",
                                                            padding: "4px 10px",
                                                            fontSize: "11px",
                                                        },
                                                        onClick: () =>
                                                            setAuthType(
                                                                "bearer",
                                                            ),
                                                        title: "Bearer Token authentication",
                                                    },
                                                    "Bearer",
                                                ),
                                            ),
                                    ),
                                    authType === "api_key" && hasApiKey
                                        ? h(
                                              "div",
                                              {
                                                  style: {
                                                      marginTop: "8px",
                                                      position: "relative",
                                                  },
                                              },
                                              h("input", {
                                                  type: showApiKey
                                                      ? "text"
                                                      : "password",
                                                  placeholder: apiKey
                                                      ? `API key set`
                                                      : "Enter API key",
                                                  value: apiKey,
                                                  onChange: (e) =>
                                                      setApiKey(e.target.value),
                                                  style: {
                                                      width: "100%",
                                                      paddingRight: "30px",
                                                      marginBottom: apiKey
                                                          ? "4px"
                                                          : "0",
                                                  },
                                              }),
                                              h("i", {
                                                  className: `fa ${showApiKey ? "fa-eye-slash" : "fa-eye"}`,
                                                  onClick: () =>
                                                      setShowApiKey(
                                                          !showApiKey,
                                                      ),
                                                  style: {
                                                      position: "absolute",
                                                      right: "10px",
                                                      top: "10px",
                                                      fontSize: "12px",
                                                      color: "var(--t3)",
                                                      cursor: "pointer",
                                                  },
                                              }),
                                              apiKey &&
                                                  h(
                                                      "div",
                                                      {
                                                          style: {
                                                              fontSize: "10px",
                                                              color: "var(--green)",
                                                              display: "flex",
                                                              alignItems:
                                                                  "center",
                                                              gap: "4px",
                                                          },
                                                      },
                                                      h("i", {
                                                          className:
                                                              "fa fa-check-circle",
                                                      }),
                                                      "API key stored in memory",
                                                  ),
                                          )
                                        : authType === "bearer" && hasBearer
                                          ? h(
                                                "div",
                                                {
                                                    style: {
                                                        marginTop: "8px",
                                                        position: "relative",
                                                    },
                                                },
                                                h("input", {
                                                    type: showBearer
                                                        ? "text"
                                                        : "password",
                                                    placeholder: bearerToken
                                                        ? `Token set`
                                                        : "Enter Bearer token",
                                                    value: bearerToken,
                                                    onChange: (e) =>
                                                        setBearerToken(
                                                            e.target.value,
                                                        ),
                                                    style: {
                                                        width: "100%",
                                                        paddingRight: "30px",
                                                        marginBottom:
                                                            bearerToken
                                                                ? "4px"
                                                                : "0",
                                                    },
                                                }),
                                                h("i", {
                                                    className: `fa ${showBearer ? "fa-eye-slash" : "fa-eye"}`,
                                                    onClick: () =>
                                                        setShowBearer(
                                                            !showBearer,
                                                        ),
                                                    style: {
                                                        position: "absolute",
                                                        right: "10px",
                                                        top: "10px",
                                                        fontSize: "12px",
                                                        color: "var(--t3)",
                                                        cursor: "pointer",
                                                    },
                                                }),
                                                bearerToken &&
                                                    h(
                                                        "div",
                                                        {
                                                            style: {
                                                                fontSize:
                                                                    "10px",
                                                                color: "var(--green)",
                                                                display: "flex",
                                                                alignItems:
                                                                    "center",

            function App() {
                // Initialize spec from injected value if available
                let initialSpec = null;
                if (typeof INJECTED_SPEC !== "undefined" && INJECTED_SPEC) {
                    try {
                        initialSpec =
                            typeof INJECTED_SPEC === "string"
                                ? JSON.parse(INJECTED_SPEC)
                                : INJECTED_SPEC;
                    } catch (e) {
                        console.error("Failed to parse injected spec:", e);
                    }
                }

                const [spec, setSpec] = useState(initialSpec);
                const [search, setSearch] = useState("");
                const endpoints = useMemo(
                    () => (spec ? buildEps(spec) : []),
                    [spec],
                );

                const [activeEp, setActive] = useState(() => {
                    const eps = initialSpec ? buildEps(initialSpec) : [];
                    const hash = window.location.hash.slice(1);
                    if (hash) {
                        const ep = eps.find((e) => e.id === hash);
                        if (ep) return ep;
                    }
                    if (eps.length > 0) {
                        const grouped = groupByTag(eps, initialSpec?.tags);
                        const tagKeys = Object.keys(grouped);
                        if (tagKeys.length > 0) {
                            return grouped[tagKeys[0]][0];
                        }
                        return eps[0];
                    }
                    return null;
                });

                const [theme, setTheme] = useState(() => {
                    try {
                        return (
                            localStorage.getItem("openapi-ui-theme") || "system"
                        );
                    } catch {
                        return "system";
                    }
                });
                const [apiKey, setApiKey] = useState("");
                const [showApiKey, setShowApiKey] = useState(false);
                const [bearerToken, setBearerToken] = useState("");
                const [showBearer, setShowBearer] = useState(false);
                const [authType, setAuthType] = useState("api_key");
                const [baseUrl, setBaseUrl] = useState("");

                // Initialize baseUrl from spec.servers when spec changes
                useEffect(() => {
                    const serverUrl = spec?.servers?.[0]?.url || "";
                    setBaseUrl(serverUrl);
                }, [spec]);

                // Sync active endpoint when endpoints change (e.g. after manual import)
                useEffect(() => {
                    if (!endpoints.length) {
                        setActive(null);
                        return;
                    }

                    const hash = window.location.hash.slice(1);
                    if (hash) {
                        const ep = endpoints.find((e) => e.id === hash);
                        if (ep) {
                            setActive(ep);
                            return;
                        }
                    }

                    // Default to visually first if not already set to a valid endpoint in the current spec
                    if (
                        !activeEp ||
                        !endpoints.find((e) => e.id === activeEp.id)
                    ) {
                        const grouped = groupByTag(endpoints, spec?.tags);
                        const tagKeys = Object.keys(grouped);
                        if (tagKeys.length > 0) {
                            setActive(grouped[tagKeys[0]][0]);
                        } else {
                            setActive(endpoints[0]);
                        }
                    }
                }, [endpoints]);

                // Handle hash navigation
                useEffect(() => {
                    const handleHashChange = () => {
                        const hash = window.location.hash.slice(1);
                        if (hash) {
                            const ep = endpoints.find((e) => e.id === hash);
                            if (ep && ep.id !== activeEp?.id) {
                                setActive(ep);
                            }
                        } else if (endpoints.length > 0) {
                            const grouped = groupByTag(endpoints, spec.tags);
                            const firstTag = Object.keys(grouped)[0];
                            const firstEp =
                                firstTag && grouped[firstTag].length > 0
                                    ? grouped[firstTag][0]
                                    : endpoints[0];

                            if (activeEp?.id !== firstEp.id) {
                                setActive(firstEp);
                            }
                        }
                    };

                    window.addEventListener("hashchange", handleHashChange);
                    return () =>
                        window.removeEventListener(
                            "hashchange",
                            handleHashChange,
                        );
                }, [endpoints, activeEp, spec.tags]);

                const applyTheme = useCallback((t) => {
                    const r =
                        t === "system"
                            ? window.matchMedia("(prefers-color-scheme: dark)")
                                  .matches
                                ? "dark"
                                : "light"
                            : t;
                    document.documentElement.setAttribute("data-theme", r);
                    const d = document.getElementById("hljs-dark");
                    const l = document.getElementById("hljs-light");
                    if (d) d.disabled = r !== "dark";
                    if (l) l.disabled = r !== "light";
                }, []);

                const changeTheme = useCallback(
                    (t) => {
                        setTheme(t);
                        applyTheme(t);
                        try {
                            localStorage.setItem("openapi-ui-theme", t);
                        } catch {}
                    },
                    [applyTheme],
                );

                useEffect(() => {
                    // Apply current theme
                    applyTheme(theme);

                    // Setup listener for system changes
                    const mq = window.matchMedia(
                        "(prefers-color-scheme: dark)",
                    );
                    const handler = (e) => {
                        if (theme === "system") {
                            applyTheme("system");
                        }
                    };

                    // Initial check isn't needed here as applyTheme(theme) runs on every 'theme' change
                    // and theme is initialized correctly.

                    mq.addEventListener("change", handler);
                    return () => mq.removeEventListener("change", handler);
                }, [applyTheme, theme]);

                // Clear sensitive auth data on page unload (security measure)
                useEffect(() => {
                    const handleBeforeUnload = () => {
                        // Credentials are in-memory only, cleared automatically
                        console.log("Page unloaded - credentials cleared");
                    };
                    window.addEventListener("beforeunload", handleBeforeUnload);
                    return () =>
                        window.removeEventListener(
                            "beforeunload",
                            handleBeforeUnload,
                        );
                }, []);

                // Update hash when active endpoint changes
                useEffect(() => {
                    if (activeEp) {
                        window.location.hash = activeEp.id;
                    }
                }, [activeEp]);

                // Update page title based on spec and active endpoint
                useEffect(() => {
                    const specTitle = spec?.info?.title || "API Documentation";
                    if (activeEp) {
                        const endpointTitle =
                            activeEp.op.summary || activeEp.path;
                        document.title = `${endpointTitle} - ${specTitle}`;
                    } else {
                        document.title = specTitle;
                    }
                }, [activeEp, spec]);

                // Show empty state if no spec is loaded
                if (!spec) {
                    return h(EmptyState, {
                        onImportClick: (sampleSpec) => {
                            setSpec(sampleSpec);
                        },
                    });

                    { className: "app" },

                            endpoints,

                                        s.description &&
                                            h(
                                                "span",
                                                {
                                                    style: {
                                                        color: "var(--t3)",
                                                        fontSize: 11,
                                                    },
                                                },
                                                s.description,
                                            ),
                                    ),
                                ),
                            ),
                            h(
                                "div",
                                {

                                        display: "flex",
                                        alignItems: "center",
                                        gap: 8,
                                        flexShrink: 0,
                                    },
                                },
                                h(
                                    "div",
                                    {

                                    },
                                    h(
                                        "button",
                                        {

                                            onClick: (e) => {
                                                e.stopPropagation();
                                                const dropdown =
                                                    e.currentTarget
                                                        .nextElementSibling;
                                                if (dropdown) {

                                                        dropdown.style

                                                    fill: "",

                                            h(

                                                    fill: "#d97757",

                                                    window.open(url, "_blank");

                                            },
                                            h(

                                                { viewBox: "0 0 191 135" },
                                                h("path", {

                                        style: { marginRight: 8 },

                                    h(

                                        { style: { marginLeft: 4 } },
                                        "v" + spec.info?.version,
                                    ),
                                ),
                            ),
                        ),
                        h(
                            "div",
                            { className: "detail" },
                            h(EndpointDetail, {
                                ep: activeEp,
                                spec,
                                apiKey,
                                bearerToken,
                                authType,
                                baseUrl,
                                setApiKey,
                                setBearerToken,
                                setAuthType,
                                showApiKey,
                                setShowApiKey,
                                showBearer,
                                setShowBearer,
                            }),
                        ),
                    ),
                );
            }

            // Close Ask AI dropdown when clicking outside
            document.addEventListener("click", (e) => {
                const askAiBtn = document.querySelector(".ask-ai-btn");
                const askAiDropdown =
                    document.querySelector(".ask-ai-dropdown");
                if (
                    askAiDropdown &&
                    askAiBtn &&
                    !askAiBtn.contains(e.target) &&
                    !askAiDropdown.contains(e.target)
                ) {
                    askAiDropdown.style.display = "none";
                }
            });

            createRoot(document.getElementById("root")).render(h(App));
        </script>
